<!DOCTYPE html>
<html lang="es">
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><title>Ingresar</title></head>
<body class="bg-dark text-white d-flex align-items-center" style="height: 100vh;">
    <div class="container" style="max-width: 450px;">
        <h2 class="mb-3 text-center text-warning fw-bold">INICIAR SESIÓN</h2>
        <form method="post" class="card p-4 bg-black border-secondary text-white shadow">
            {% csrf_token %} 
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning w-100 fw-bold mt-3">ENTRAR</button>
        </form>
    </div>
</body>
</html>
