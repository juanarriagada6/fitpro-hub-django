<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ accion }} Rutina - FitPro Hub</title>
    <style>
        body {
            background-color: #212529 !important;
            color: white !important;
            padding: 3rem !important;
        }
        .card {
            background-color: #000000 !important;
            border-color: #6c757d !important;
        }
        .form-control, .form-select {
            background-color: #212529 !important;
            color: white !important;
            border-color: #6c757d !important;
        }
        .form-control:focus, .form-select:focus {
            background-color: #212529 !important;
            color: white !important;
            border-color: #ffc107 !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25) !important;
        }
    </style>
</head>
<body class="bg-dark text-white p-5">
    <div class="container" style="max-width: 600px;">
        <div class="card p-4 shadow">
            <h3 class="text-warning fw-bold mb-4">{{ accion }} Rutina</h3>
            
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                
                <div class="mt-4 d-flex justify-content-end">
                    <a href="{% url 'panel_administracion' %}" class="btn btn-outline-light me-2">Cancelar</a>
                    <button type="submit" class="btn btn-warning fw-bold">Guardar Rutina</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
