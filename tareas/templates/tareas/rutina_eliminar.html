<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Eliminar Rutina - FitPro Hub</title>
    <style>
        body {
            background-color: #212529 !important;
            color: white !important;
            padding: 4rem !important;
        }
        .card {
            background-color: #000000 !important;
            border-color: #dc3545 !important;
        }
    </style>
</head>
<body class="bg-dark text-white p-5">
    <div class="container" style="max-width: 500px;">
        <div class="card p-4 text-center shadow">
            <h3 class="text-danger fw-bold mb-3">⚠️ ¿Estás seguro?</h3>
            <p class="text-light">
                Estás a punto de eliminar la rutina <strong>"{{ rutina.titulo }}"</strong> 
                del alumno <strong>{{ rutina.alumno.username }}</strong>. Esta acción no se puede deshacer.
            </p>
            
            <form method="POST" class="mt-4">
                {% csrf_token %}
                <a href="{% url 'panel_administracion' %}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-danger fw-bold ms-2">Sí, Eliminar Definitivamente</button>
            </form>
        </div>
    </div>
</body>
</html>
