<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Mi Panel - FitPro</title>
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2>💪 Panel de Alumno: <span class="text-warning">{{ user.username }}</span></h2>
            <a href="{% url 'index' %}" class="btn btn-outline-light">Inicio</a>
        </div>
        <h3 class="mb-4 text-secondary">Mis Rutinas Asignadas</h3>
        <div class="row">
            {% for r in rutinas %}
            <div class="col-md-6 mb-3">
                <div class="card bg-black border-secondary text-white h-100">
                    <div class="card-body">
                        <h5 class="card-title text-warning fw-bold">{{ r.titulo }}</h5>
                        <p class="card-text" style="white-space: pre-line;">{{ r.ejercicios }}</p>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-info bg-black text-info border-info">Aún no tienes rutinas asignadas. ¡Tu Coach la subirá pronto!</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
